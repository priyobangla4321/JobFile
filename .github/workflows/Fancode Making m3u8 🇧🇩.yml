name: Fancode Making m3u8 🇧🇩

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target playlist repository (sirometv/playlist)
        uses: actions/checkout@v4
        with:
          repository: sirometv/playlist
          token: ${{ secrets.PAT_TOKEN }}
          path: playlist-repo

      - name: Download JSON data from secret URL
        run: |
          curl -L "${{ secrets.Fancode_2026 }}" -o fancode_data.json

      - name: Get Bangladesh time
        id: bd_time
        run: |
          export TZ='Asia/Dhaka'
          BD_TIME=$(date '+%I:%M:%S%p - %d-%m-%y' | sed 's/AM/am/g; s/PM/pm/g')
          echo "BD_TIME=$BD_TIME" >> $GITHUB_OUTPUT
          echo "Bangladesh time: $BD_TIME"

      - name: Process JSON and generate m3u8 files + mapping.json
        run: |
          python3 << 'EOF'
          import json
          import os
          import re
          import string
          import sys

          def safe_filename(title):
              # Replace spaces with dash
              name = title.replace(' ', '-')
              # Replace problematic characters with dash
              problematic = r'[\\/*?:"<>|\'^]'
              name = re.sub(problematic, '-', name)
              # Keep only letters, digits, dash, underscore, dot
              allowed = set(string.ascii_letters + string.digits + '-._')
              name = ''.join(c if c in allowed else '-' for c in name)
              # Collapse multiple dashes
              name = re.sub(r'-+', '-', name)
              # Remove leading/trailing dashes/underscores/dots
              name = name.strip('-_')
              return name

          json_file = "fancode_data.json"
          output_dir = "playlist-repo/fancode"
          os.makedirs(output_dir, exist_ok=True)

          # Load JSON data
          try:
              with open(json_file, 'r', encoding='utf-8') as f:
                  data = json.load(f)
          except Exception as e:
              print(f"Error loading JSON: {e}")
              sys.exit(1)

          # Ensure data is a dict and has 'matches' key
          if not isinstance(data, dict):
              print(f"Error: Expected JSON object, got {type(data)}")
              sys.exit(1)

          if 'matches' not in data:
              print("Error: No 'matches' key found in JSON")
              sys.exit(1)

          matches = data['matches']
          if not isinstance(matches, list):
              print(f"Error: 'matches' should be a list, got {type(matches)}")
              sys.exit(1)

          # Remove old .m3u8 files
          for fname in os.listdir(output_dir):
              if fname.endswith('.m3u8'):
                  os.remove(os.path.join(output_dir, fname))

          mapping = {}
          file_counter = 1

          # Process each match
          for match in matches:
              if not isinstance(match, dict):
                  print(f"Skipping non-dict match: {match}")
                  continue

              # Only process LIVE matches
              status = match.get('status', '')
              if status != 'LIVE':
                  print(f"Skipping match {match.get('match_id', 'unknown')} with status: {status}")
                  continue

              match_id = str(match.get('match_id', ''))
              title = match.get('title', '').strip()
              if not title:
                  title = f"Match-{match_id}"
              tvg_logo = match.get('image', '')  # using 'image' field as logo
              tvg_language = match.get('language', 'english').lower()

              # Get auto_streams
              auto_streams = match.get('auto_streams', [])
              if not auto_streams or not isinstance(auto_streams, list):
                  print(f"No auto_streams for match {match_id}, skipping")
                  continue

              # Use first auto_stream entry
              auto_entry = auto_streams[0]
              if not isinstance(auto_entry, dict):
                  print(f"auto_streams[0] not a dict for match {match_id}, skipping")
                  continue

              auto_playlist = auto_entry.get('auto', '')
              if not auto_playlist:
                  print(f"No 'auto' field in auto_streams for match {match_id}, skipping")
                  continue

              # Parse the auto playlist (HLS format)
              lines = auto_playlist.strip().split('\n')
              stream_inf_lines = []
              urls = []

              i = 0
              while i < len(lines):
                  line = lines[i].strip()
                  if line.startswith('#EXT-X-STREAM-INF:'):
                      if i + 1 < len(lines):
                          url_line = lines[i + 1].strip()
                          # Replace 'in-mc-flive' with 'bd-mc-flive'
                          url_line = url_line.replace('in-mc-flive', 'bd-mc-flive')
                          stream_inf_lines.append(line)
                          urls.append(url_line)
                          i += 2
                      else:
                          i += 1
                  else:
                      i += 1

              if not urls:
                  print(f"No stream info found for match {match_id}")
                  continue

              # Generate m3u8 filename from title
              safe_name = safe_filename(title) + '.m3u8'
              file_path = os.path.join(output_dir, safe_name)

              # Write the m3u8 file
              with open(file_path, 'w', encoding='utf-8') as f:
                  f.write('#EXTM3U\n')
                  for inf, url in zip(stream_inf_lines, urls):
                      f.write(inf + '\n')
                      f.write(url + '\n')
                      f.write('\n')  # blank line for readability

              # Build mapping entry
              raw_base = "https://raw.githubusercontent.com/sirometv/playlist/main/fancode"
              live_now = f"{raw_base}/{safe_name}"
              mapping[match_id] = {
                  "file": file_counter,
                  "group_title": title,
                  "tvg_logo": tvg_logo,
                  "tvg_language": tvg_language,
                  "Live_Now": live_now
              }
              file_counter += 1
              print(f"Generated: {file_path} for match {match_id}")

          # Write mapping.json
          mapping_path = os.path.join(output_dir, 'mapping.json')
          with open(mapping_path, 'w', encoding='utf-8') as f:
              json.dump(mapping, f, indent=2, ensure_ascii=False)
          print("mapping.json created with", len(mapping), "LIVE matches.")

          EOF

      - name: Commit and push changes
        run: |
          cd playlist-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fancode/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🆗 Fancode - Updated ✅ ${{ steps.bd_time.outputs.BD_TIME }}"
            git push
          fi
