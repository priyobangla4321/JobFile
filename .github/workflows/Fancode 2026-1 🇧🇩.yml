name: Fancode 2026-1 🇧🇩

on:
  schedule:
    # প্রতি ২০ মিনিট পর পর চালাবে (cron সিনট্যাক্স)
    - cron: '*/20 * * * *'
  workflow_dispatch:   # ম্যানুয়ালি চালানোর সুবিধা

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      # JobFile রেপো চেকআউট (প্রয়োজন নেই, তবে রাখা যায়)
      - name: Checkout JobFile repo (optional)
        uses: actions/checkout@v4
        with:
          repository: priyobangla4321/JobFile
          token: ${{ secrets.PAT_TOKEN }}
          path: jobfile-repo   # আলাদা ফোল্ডারে রাখা হবে, কাজে লাগবে না

      - name: Fetch source playlist
        run: |
          SOURCE_URL="${{ secrets.Fancode_2026 }}"
          curl -L "$SOURCE_URL" -o source.m3u

      - name: Process playlist (filter 480p & 1080p, set group-title="Live Event")
        run: |
          # আউটপুট ফাইল শুরু
          echo '#EXTM3U' > fancodeBD.m3u
          echo '#🔴 এই ফাইলের সমস্ত লিঙ্ক পাবলিক সোর্স থেকে সংগ্রহ করা হয়েছে। যদি কেউ তাদের সোর্স মুছে ফেলতে চান, তাহলে দয়া করে আমাদের জানান। আমরা আপনার মতামত এবং প্রচেষ্টাকে সম্মান করি, তাই আপনার সোর্স মুছে ফেলার ব্যাপারে আমরা আপত্তি করব না।' >> fancodeBD.m3u
          echo '#🔴All the links in this file are collected from public sources. If anyone wants to remove their source, please let us know. We respect your opinions and efforts, so we will not object to removing your source.' >> fancodeBD.m3u
          
          # বাংলাদেশ সময় (Asia/Dhaka) যোগ
          TZ="Asia/Dhaka" date +'#Update Time ✔️: %I:%M:%S%p - %d-%m-%Y (Bangladesh Time)' >> fancodeBD.m3u
          echo '#Telegram 🔗: https://t.me/sirometv' >> fancodeBD.m3u
          echo '#WEB TV 📺: https://sirometv-tv.vercel.app' >> fancodeBD.m3u
          echo '' >> fancodeBD.m3u   # একটি ফাঁকা লাইন

          # source.m3u পার্স করা (ধরে নিচ্ছি প্রতিটি এন্ট্রি: #EXTINF লাইন + URL লাইন)
          in_extinf=0
          extinf_line=""
          while IFS= read -r line; do
            if [[ $line == \#EXTINF* ]]; then
              extinf_line="$line"
              in_extinf=1
            elif [[ $in_extinf -eq 1 ]]; then
              url="$line"
              # শুধুমাত্র 480p/480.m3u8 এবং 1080p/1080.m3u8 লিংক নিবো
              if [[ $url == *"/480p.m3u8"* || $url == *"/480.m3u8"* || $url == *"/1080p.m3u8"* || $url == *"/1080.m3u8"* ]]; then
                # group-title পরিবর্তন করে "Live Event"
                new_extinf=$(echo "$extinf_line" | sed 's/group-title="[^"]*"/group-title="Live Event"/')
                echo "$new_extinf" >> fancodeBD.m3u
                echo "$url" >> fancodeBD.m3u
                echo "" >> fancodeBD.m3u   # প্রতিটি এন্ট্রির পর একটি ফাঁকা লাইন (আপনার নির্দেশ অনুযায়ী)
              fi
              in_extinf=0
            fi
          done < source.m3u

      - name: Checkout destination repository (sirometv/playlist)
        uses: actions/checkout@v4
        with:
          repository: sirometv/playlist
          token: ${{ secrets.PAT_TOKEN }}
          path: dest_repo

      - name: Copy and commit updated playlist
        run: |
          cp fancodeBD.m3u dest_repo/fancodeBD.m3u
          cd dest_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fancodeBD.m3u
          # পরিবর্তন থাকলেই শুধু commit ও push করবে
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update fancodeBD.m3u"
          git push
