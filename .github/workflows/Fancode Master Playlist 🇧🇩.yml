name: Fancode Master Playlist 🇧🇩

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  build-master-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository (sirometv/playlist)
        uses: actions/checkout@v4
        with:
          repository: sirometv/playlist
          token: ${{ secrets.PAT_TOKEN }}
          path: playlist-repo

      - name: Download original playlist from secret
        run: |
          curl -L "${{ secrets.Fancode_2026 }}" -o original.m3u

      - name: Generate master playlist (fancodeBD.m3u)
        run: |
          python3 << 'EOF'
          import os
          import re
          import string

          # ---------- ফাইলের নাম স্যানিটাইজ করার ফাংশন (আগের ওয়ার্কফ্লোর সাথে মিল রেখে) ----------
          def safe_filename(name):
              # স্পেস সরানো
              name = name.replace(' ', '')
              # সমস্যাজনক ক্যারেক্টার ড্যাশে রূপান্তর
              problematic = r'[\\/*?:"<>|\'^]'
              name = re.sub(problematic, '-', name)
              # শুধু অক্ষর, সংখ্যা, ড্যাশ, আন্ডারস্কোর, ডট রাখা
              allowed = set(string.ascii_letters + string.digits + '-._')
              name = ''.join(c if c in allowed else '-' for c in name)
              # একাধিক ড্যাশ সংকুচিত করা
              name = re.sub(r'-+', '-', name)
              # শুরু বা শেষের ড্যাশ/আন্ডারস্কোর/ডট বাদ দেওয়া
              return name.strip('-_')

          original_playlist = "original.m3u"
          repo_path = "playlist-repo"
          fancode_dir = os.path.join(repo_path, "fancode")
          master_playlist_path = os.path.join(repo_path, "fancodeBD.m3u")

          # ---------- মূল প্লেলিস্ট পার্স করে group-title সংগ্রহ ----------
          entries = []          # (সম্পূর্ণ EXTINF লাইন, group-title)
          with open(original_playlist, 'r', encoding='utf-8') as f:
              lines = f.readlines()

          i = 0
          while i < len(lines):
              line = lines[i].strip()
              if line.startswith("#EXTINF:"):
                  extinf = line
                  # group-title এক্সট্রাক্ট
                  group_match = re.search(r'group-title="([^"]*)"', line)
                  if group_match:
                      group_title = group_match.group(1)
                      entries.append((extinf, group_title))
                  i += 2          # পরের লাইনে URL আছে, সেটি বাদ দিচ্ছি
              else:
                  i += 1

          # ---------- মাস্টার প্লেলিস্ট তৈরি ----------
          master_lines = ["#EXTM3U"]
          for extinf, group_title in entries:
              # গ্রুপ টাইটেল থেকে প্রত্যাশিত ফাইলের নাম তৈরি
              safe_name = safe_filename(group_title) + ".m3u8"
              file_path = os.path.join(fancode_dir, safe_name)

              # ফাইলটি fancode ফোল্ডারে আছে কিনা যাচাই
              if os.path.isfile(file_path):
                  raw_url = f"https://raw.githubusercontent.com/sirometv/playlist/main/fancode/{safe_name}"
                  master_lines.append(extinf)
                  master_lines.append(raw_url)
              else:
                  print(f"সতর্কতা: {safe_name} ফাইলটি {group_title} গ্রুপের জন্য পাওয়া যায়নি")

          content = "\n".join(master_lines) + "\n"

          # ---------- পরিবর্তন থাকলে লেখা, না থাকলে এড়িয়ে যাওয়া ----------
          write_needed = True
          if os.path.exists(master_playlist_path):
              with open(master_playlist_path, 'r', encoding='utf-8') as f:
                  old_content = f.read()
              if old_content == content:
                  write_needed = False

          if write_needed:
              with open(master_playlist_path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print("মাস্টার প্লেলিস্ট আপডেট করা হয়েছে।")
          else:
              print("মাস্টার প্লেলিস্টে কোনো পরিবর্তন নেই।")
          EOF

      - name: Commit and push changes
        run: |
          cd playlist-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fancodeBD.m3u
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update fancode master playlist"
            git push
          fi
