#এটির কাজ হচ্ছে সিক্রেট Fancode_2026 থেকে Extinf কপি করবে আর Fancode থেকে m3u8 লিংক কালেক্ট করবে।
name: Fancode Master Playlist 🇧🇩

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  build-master-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository (sirometv/playlist)
        uses: actions/checkout@v4
        with:
          repository: sirometv/playlist
          token: ${{ secrets.PAT_TOKEN }}
          path: playlist-repo

      - name: Download original playlist from secret
        run: |
          curl -L "${{ secrets.Fancode_2026 }}" -o original.m3u

      - name: Generate master playlist (fancodeBD.m3u) with unique groups
        run: |
          python3 << 'EOF'
          import os
          import re
          import string

          def safe_filename(name):
              """গ্রুপ টাইটেল থেকে নিরাপদ ফাইলের নাম তৈরি (স্পেস সরানো, অবৈধ ক্যারেক্টার ড্যাশে)"""
              name = name.replace(' ', '')
              problematic = r'[\\/*?:"<>|\'^]'
              name = re.sub(problematic, '-', name)
              allowed = set(string.ascii_letters + string.digits + '-._')
              name = ''.join(c if c in allowed else '-' for c in name)
              name = re.sub(r'-+', '-', name)
              return name.strip('-_')

          original_playlist = "original.m3u"
          repo_path = "playlist-repo"
          fancode_dir = os.path.join(repo_path, "fancode")
          master_playlist_path = os.path.join(repo_path, "fancodeBD.m3u")

          # মূল প্লেলিস্ট পার্স করে প্রতিটি গ্রুপ টাইটেলের জন্য একটি করে EXTINF লাইন সংগ্রহ
          groups = {}  # key: group_title, value: (modified_extinf, tvg_id, tvg_logo, tvg_language)

          with open(original_playlist, 'r', encoding='utf-8') as f:
              lines = f.readlines()

          i = 0
          while i < len(lines):
              line = lines[i].strip()
              if line.startswith("#EXTINF:"):
                  extinf = line
                  # অ্যাট্রিবিউটগুলো এক্সট্রাক্ট
                  tvg_id = re.search(r'tvg-id="([^"]*)"', extinf)
                  tvg_id = tvg_id.group(1) if tvg_id else ""
                  
                  tvg_logo = re.search(r'tvg-logo="([^"]*)"', extinf)
                  tvg_logo = tvg_logo.group(1) if tvg_logo else ""
                  
                  tvg_language = re.search(r'tvg-language="([^"]*)"', extinf)
                  tvg_language = tvg_language.group(1) if tvg_language else ""
                  
                  group_title = re.search(r'group-title="([^"]*)"', extinf)
                  group_title = group_title.group(1) if group_title else "Unknown"

                  # শুধু প্রথমবার পাওয়া গ্রুপটি সংরক্ষণ করি
                  if group_title not in groups:
                      # EXTINF লাইনটি মডিফাই: শেষ কমার পরের অংশ "Auto" বসাই
                      parts = extinf.rsplit(',', 1)
                      if len(parts) == 2:
                          new_extinf = parts[0] + ',Auto'
                      else:
                          new_extinf = extinf + ',Auto'  # fallback (কোনো কমা না থাকলে)

                      groups[group_title] = (new_extinf, tvg_id, tvg_logo, tvg_language)

                  # পরের লাইনে URL থাকবে, তা স্কিপ করি (কারণ আমরা URL ব্যবহার করব না)
                  i += 2
              else:
                  i += 1

          # মাস্টার প্লেলিস্ট তৈরি
          master_lines = ["#EXTM3U"]
          for group_title, (extinf, tvg_id, tvg_logo, tvg_language) in groups.items():
              safe_name = safe_filename(group_title) + ".m3u8"
              file_path = os.path.join(fancode_dir, safe_name)

              if os.path.isfile(file_path):
                  raw_url = f"https://raw.githubusercontent.com/sirometv/playlist/main/fancode/{safe_name}"
                  master_lines.append(extinf)
                  master_lines.append(raw_url)
              else:
                  print(f"সতর্কতা: {group_title} গ্রুপের জন্য {safe_name} ফাইলটি পাওয়া যায়নি।")

          content = "\n".join(master_lines) + "\n"

          # পরিবর্তন থাকলে লেখা, না থাকলে এড়িয়ে যাওয়া
          write_needed = True
          if os.path.exists(master_playlist_path):
              with open(master_playlist_path, 'r', encoding='utf-8') as f:
                  old_content = f.read()
              if old_content == content:
                  write_needed = False

          if write_needed:
              with open(master_playlist_path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print("মাস্টার প্লেলিস্ট আপডেট করা হয়েছে (প্রতি গ্রুপের জন্য একক এন্ট্রি)।")
          else:
              print("মাস্টার প্লেলিস্টে কোনো পরিবর্তন নেই।")
          EOF

      - name: Commit and push changes
        run: |
          cd playlist-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fancodeBD.m3u
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update fancode master playlist (unique groups with Auto)"
            git push
          fi
