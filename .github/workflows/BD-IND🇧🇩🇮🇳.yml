              "Sun Bangla Cinema" 
              "Jonack" 
              "R Plus Gold" 
              "R Plus News" 
              "Rongeen TV" 
              "Kalkata TV" 
              "Amar Cinema" 
              "Amar Bangla" 
              "Amar Bangla Digital" 
              "Khushbo Bangla" 
              "NKTV" 
              "Pratidin Time" 
              "Bangla Jago" 
              "Orange Bangla"
              "Zee 24 Ghanta" 
              "ABP Ananda" 
              "Samay Kolkata" 
              "Republick Bangla" 
              "TV9 Bangla" 
              "High News" 
              "News Live" 
              "AB Ananda Barta" 
              "Bangla+" 
              "News 18 বাংলা" 
              "News 18 আসম" 
              "Calcutta News" 
              "DD Bangla" 
              "HRS 24 TV" 
              "Dy 365" 
              "DD Bangla" 
              "DD Bangla DurDorshon" 
              "DD Tripura" 
              "News Time Bangla" 
              "Channel Win" 
              "Express News"
            )
          fi

          # ---------- Parse source playlist ----------
          declare -A entry_map      # normalized channel name -> full entry block (with trailing newline)
          declare -A group_map      # normalized channel name -> group-title

          current_entry=""
          current_channel=""
          current_group=""
          inside_entry=0

          while IFS= read -r line || [ -n "$line" ]; do
            if [[ $line =~ ^#EXTINF ]]; then
              # Save previous entry
              if [ $inside_entry -eq 1 ] && [ -n "$current_channel" ]; then
                entry_map["$current_channel"]="$current_entry"$'\n'
                group_map["$current_channel"]="$current_group"
              fi
              # Start new entry
              current_entry="$line"
              # Extract channel name (after last comma)
              channel_name=$(echo "$line" | sed -n 's/.*, *//p' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              current_channel=$(echo "$channel_name" | tr '[:upper:]' '[:lower:]')
              # Extract group-title
              if [[ $line =~ group-title=\"([^\"]*)\" ]]; then
                current_group="${BASH_REMATCH[1]}"
              else
                current_group=""
              fi
              inside_entry=1
            else
              if [ $inside_entry -eq 1 ]; then
                current_entry+=$'\n'"$line"
              fi
            fi
          done < "$SOURCE_FILE"
          # Save last entry
          if [ $inside_entry -eq 1 ] && [ -n "$current_channel" ]; then
            entry_map["$current_channel"]="$current_entry"$'\n'
            group_map["$current_channel"]="$current_group"
          fi

          # ---------- Build blocks for output ----------
          RED_LINE=$(printf '#🔴%.0s' {1..50})   # 50 red circles
          blocks=()
          last_group=""

          for raw_channel in "${CHANNELS[@]}"; do
            channel=$(echo "$raw_channel" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            norm_channel=$(echo "$channel" | tr '[:upper:]' '[:lower:]')

            if [[ -n "${entry_map[$norm_channel]}" ]]; then
              # Channel found
              group="${group_map[$norm_channel]}"
              # Insert group separator if needed
              if [ ${#blocks[@]} -gt 0 ] && [ "$group" != "$last_group" ]; then
                blocks+=("$RED_LINE"$'\n'"$RED_LINE"$'\n')
              fi
              # Add entry block (already ends with newline)
              blocks+=("${entry_map[$norm_channel]}")
              last_group="$group"
            else
              # Channel not found – add comment line
              blocks+=("# $channel not found"$'\n')
              # Do not change last_group
            fi
          done

          # ---------- Write output file ----------
          {
            echo "#EXTM3U"
            echo "# Sirome TV (2022- 2026)"
            echo "#🔴 এই ফাইলের সমস্ত লিঙ্ক পাবলিক সোর্স থেকে সংগ্রহ করা হয়েছে। যদি কেউ তাদের সোর্স মুছে ফেলতে চান, তাহলে দয়া করে আমাদের জানান। আমরা আপনার মতামত এবং প্রচেষ্টাকে সম্মান করি, তাই আপনার সোর্স মুছে ফেলার ব্যাপারে আমরা আপত্তি করব না।"
            echo "# All the links in this file are collected from public sources. If anyone wants to remove their source, please let us know. We respect your opinions and efforts, so we will not object to removing your source."
            BD_TIME=$(TZ=Asia/Dhaka date +"%I:%M:%S%p - %d-%m-%Y" | sed 's/AM/am/;s/PM/pm/')
            echo "#Update Time: $BD_TIME ✅"
            echo   # one blank line after header
          } > "$OUTPUT_FILE"

          # Append blocks with two blank lines between them
          for i in "${!blocks[@]}"; do
            printf "%s" "${blocks[$i]}" >> "$OUTPUT_FILE"
            if [ $i -lt $((${#blocks[@]}-1)) ]; then
              echo >> "$OUTPUT_FILE"
              echo >> "$OUTPUT_FILE"
            fi
          done

          echo "✅ New playlist generated at $OUTPUT_FILE"

      - name: Commit and push if changed
        run: |
          cd playlist-repo

          # Set git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add the file
          git add Bangla-BD-IND.m3u

          # Check if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          # Determine commit message based on trigger
          CURRENT_TIME=$(TZ=Asia/Dhaka date +"%I:%M:%S%p - %d-%m-%Y" | sed 's/AM/am/;s/PM/pm/')
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            COMMIT_MSG="🆗 Bangla TV 🆚 BD-IND 🔄 sirometv.m3u  ✅ at $CURRENT_TIME"
          else
            COMMIT_MSG="🆗 Bangla TV🤖 BD-IND 🔄 Updated Done ✅ at $CURRENT_TIME"
          fi

          git commit -m "$COMMIT_MSG"
          git push origin main
