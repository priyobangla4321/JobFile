name: BD-IND🇧🇩🇮🇳

on:
  schedule:
    - cron: '*/30 * * * *'   # প্রতি ৩০ মিনিট পর পর
  workflow_dispatch:          # ম্যানুয়াল রান

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository (sirometv/playlist)
        uses: actions/checkout@v4
        with:
          repository: sirometv/playlist
          token: ${{ secrets.PAT_TOKEN }}
          path: playlist-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate playlist
        id: generate
        env:
          TZ: Asia/Dhaka
          # চ্যানেলের তালিকা সরাসরি এখানে (প্রতি লাইনে একটি নাম)
          CHANNEL_LIST: |
            BTV National
            BTV CTG
            BTV NEWS
            Sangsad TV
            Islamic TV
            Jamuna TV
            Somoy TV
            Ekushey TV
            NTV BD
            NTV-Europe
            NTV UK
            Channel 24
            Star Jalsha
            Star-Jalsha Movies
            Zee Bangla
        run: |
          cd playlist-repo

          # বর্তমান সময় বাংলাদেশ সময়ে
          CURRENT_TIME=$(TZ=Asia/Dhaka date +"%I:%M:%S%p - %d-%m-%Y")
          echo "Current time: $CURRENT_TIME"

          # সোর্স প্লেলিস্টের হ্যাশ
          SOURCE_HASH=$(sha256sum sirometv.m3u | cut -d' ' -f1)
          echo "Source hash: $SOURCE_HASH"

          # আগের হ্যাশ পড়ুন
          PREV_HASH=""
          if [ -f .sirometv_hash ]; then
            PREV_HASH=$(cat .sirometv_hash)
          fi
          echo "Previous hash: $PREV_HASH"

          # পাইথন স্ক্রিপ্ট চালান
          python3 << 'EOF'
import os
import re

# চ্যানেল লিস্ট এনভায়রনমেন্ট থেকে পড়ি
channels_str = os.environ.get('CHANNEL_LIST', '')
desired_channels = [line.strip() for line in channels_str.splitlines() if line.strip() and not line.strip().startswith('#')]

print(f"Desired channels: {desired_channels}")

source_file = 'sirometv.m3u'
output_file = 'Bngla-BD-IND.m3u'

# সোর্স ফাইল পড়ি
with open(source_file, 'r', encoding='utf-8') as f:
    lines = f.readlines()

# এন্ট্রি পার্স
entries = []
i = 0
while i < len(lines):
    line = lines[i].rstrip('\n')
    if line.startswith('#EXTINF'):
        extinf = line
        group_match = re.search(r'group-title="([^"]*)"', extinf)
        group = group_match.group(1) if group_match else ''
        name = extinf.split(',')[-1].strip()
        urls = []
        i += 1
        while i < len(lines) and not lines[i].startswith('#EXTINF'):
            urls.append(lines[i].rstrip('\n'))
            i += 1
        entries.append({'extinf': extinf, 'urls': urls, 'group': group, 'name': name})
    else:
        i += 1

print(f"Total entries in source: {len(entries)}")

# আউটপুট ফাইলের জন্য কন্টেন্ট বিল্ড
output_lines = []
output_lines.append('#EXTM3U')
output_lines.append('# Sirome TV (2022- 2026)')
output_lines.append('#🔴 এই ফাইলের সমস্ত লিঙ্ক পাবলিক সোর্স থেকে সংগ্রহ করা হয়েছে। যদি কেউ তাদের সোর্স মুছে ফেলতে চান, তাহলে দয়া করে আমাদের জানান। আমরা আপনার মতামত এবং প্রচেষ্টাকে সম্মান করি, তাই আপনার সোর্স মুছে ফেলার ব্যাপারে আমরা আপত্তি করব না।')
output_lines.append('# All the links in this file are collected from public sources. If anyone wants to remove their source, please let us know. We respect your opinions and efforts, so we will not object to removing your source.')
output_lines.append(f'#Update Time: {os.environ["CURRENT_TIME"]} ✅')
output_lines.append('')

RED_SEP = '#🔴' * 50

# ম্যাচিং এন্ট্রি খুঁজি
matched = []
found_names = set()
for entry in entries:
    if entry['name'] in desired_channels:
        matched.append(entry)
        found_names.add(entry['name'])

# মিসিং চ্যানেল
missing = [ch for ch in desired_channels if ch not in found_names]

print(f"Matched: {len(matched)}, Missing: {len(missing)}")

# আউটপুট ফাইল সাজাই
prev_group = None
first_entry = True
for entry in matched:
    if entry['group'] != prev_group:
        if not first_entry:
            output_lines.append('')
            output_lines.append(RED_SEP)
            output_lines.append(RED_SEP)
            output_lines.append('')
        prev_group = entry['group']
    else:
        if not first_entry:
            output_lines.append('')
            output_lines.append('')
    output_lines.append(entry['extinf'])
    output_lines.extend(entry['urls'])
    first_entry = False

if missing:
    output_lines.append('')
    output_lines.append('# Missing channels (not found in source):')
    for ch in missing:
        output_lines.append(f'# {ch} not found')
    output_lines.append('')

new_content = '\n'.join(output_lines)

# বিদ্যমান ফাইলের সাথে তুলনা
if os.path.exists(output_file):
    with open(output_file, 'r', encoding='utf-8') as f:
        existing_content = f.read()
else:
    existing_content = ''

changed = new_content != existing_content
source_changed = (os.environ['SOURCE_HASH'] != os.environ['PREV_HASH'])

# আউটপুট সেটিং
with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
    f.write(f"changed={'true' if changed else 'false'}\n")
    f.write(f"source_changed={'true' if source_changed else 'false'}\n")
    f.write(f"current_time={os.environ['CURRENT_TIME']}\n")
    f.write(f"source_hash={os.environ['SOURCE_HASH']}\n")

if changed:
    with open(output_file, 'w', encoding='utf-8') as f:
        f.write(new_content)
    print("Playlist updated.")
else:
    print("No changes detected.")
EOF
        env:
          CURRENT_TIME: ${{ CURRENT_TIME }}
          SOURCE_HASH: ${{ SOURCE_HASH }}
          PREV_HASH: ${{ PREV_HASH }}
          CHANNEL_LIST: ${{ env.CHANNEL_LIST }}

      - name: Commit and push if changed
        if: steps.generate.outputs.changed == 'true'
        run: |
          cd playlist-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CURRENT_TIME="${{ steps.generate.outputs.current_time }}"
          SOURCE_CHANGED="${{ steps.generate.outputs.source_changed }}"
          SOURCE_HASH="${{ steps.generate.outputs.source_hash }}"

          if [ "$SOURCE_CHANGED" == "true" ]; then
            COMMIT_MSG="🆗 Bangla TV 🆚 BD-IND 🔄 sirometv.m3u ✅ at $CURRENT_TIME"
          else
            # প্রথম কমিট চেক (যদি ফাইল পূর্বে না থাকে)
            if git rev-parse --verify HEAD >/dev/null 2>&1 && git ls-files --error-unmatch Bngla-BD-IND.m3u >/dev/null 2>&1; then
              COMMIT_MSG="🆗 Bangla TV🤖 BD-IND 🔄 Updated Done ✅ at $CURRENT_TIME"
            else
              COMMIT_MSG="🆗 Bangla TV🤖 BD-IND 🆗 Started ✅ at $CURRENT_TIME"
            fi
          fi

          # সোর্স হ্যাশ সবসময় আপডেট করুন (পরবর্তী রানের জন্য)
          echo "$SOURCE_HASH" > .sirometv_hash
          git add .sirometv_hash
          git add Bngla-BD-IND.m3u
          git commit -m "$COMMIT_MSG"
          git push
