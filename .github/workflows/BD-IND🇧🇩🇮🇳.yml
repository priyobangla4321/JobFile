name: BD-IND🇧🇩🇮🇳

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  repository_dispatch:
    types: [update-sirometv-m3u]
  workflow_dispatch:      # Allow manual trigger

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout JobFile repo (to get channels.txt)
        uses: actions/checkout@v4
        with:
          path: jobfile-repo

      - name: Checkout playlist repo (sirometv/playlist)
        uses: actions/checkout@v4
        with:
          repository: sirometv/playlist
          token: ${{ secrets.PAT_TOKEN }}
          path: playlist-repo

      - name: Generate new Bangla-BD-IND.m3u
        run: |
          set -e
          cd jobfile-repo

          # ---------- Configuration ----------
          SOURCE_FILE="$GITHUB_WORKSPACE/playlist-repo/sirometv.m3u"
          OUTPUT_FILE="$GITHUB_WORKSPACE/playlist-repo/Bangla-BD-IND.m3u"
          CHANNELS_FILE="channels.txt"

          # ---------- Read channel list ----------
          if [ -f "$CHANNELS_FILE" ]; then
            mapfile -t CHANNELS < "$CHANNELS_FILE"
            # Remove empty lines and trim whitespace
            CHANNELS=($(printf "%s\n" "${CHANNELS[@]}" | awk 'NF {gsub(/^[ \t]+|[ \t]+$/, ""); print}'))
          else
            echo "⚠️ channels.txt not found. Using default list."
            CHANNELS=(
              "BTV National"
              "BTV CTG"
              "BTV NEWS"
              "Sangsad TV"
              "Islamic TV"
              "Jamuna TV"
