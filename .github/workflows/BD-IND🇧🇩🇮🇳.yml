              "Channel 9" 
              "Channel I" 
              "Bangla Vision" 
              "Maasranga TV" 
              "Duronto" 
              "Deepto TV" 
              "News 24" 
              "Boishakhi TV" 
              "Boishakhi Plus" 
              "Bijoy TV" 
              "ATN Islamic" 
              "ATN Bangla" 
              "ATN-Bangla News" 
              "ATN-Bangla Music" 
              "ATN-Bangla UK" 
              "DBC News" 
              "Independent TV" 
              "Bangla TV" 
              "Bangla-TV Europe" 
              "Desh TV" 
              "RTV" 
              "R-TV Music" 
              "Ekattor TV" 
              "Nagorik TV" 
              "Ekhon TV" 
              "News21 TV" 
              "Kids Creation" 
              "My TV" 
              "Mohona TV" 
              "Ananda TV" 
              "Asian TV" 
              "Gaan Bangla" 
              "Channel 5 TV" 
              "Peace TV Bangla" 
              "Islam Bangla" "
              Iqra TV" 
              "Azan TV" 
              "Madani TV" 
              "Bangla 21" 
              "Movie Bangla" 
              "Matri Bhumi" 
              "Magic Bangla" 
              "Star News" 
              "SRK TV" 
              "Bartoman Television" 
              "Biswa Bangla 24" 
              "Desh Bangla TV" 
              "Jonmo Bhumi" 
              "Max Bangla TV"
              "Movie Plus" 
              "Alpona TV" 
              "Channel A1" 
              "Channel S UK" 
              "Nandan TV" 
              "Global TV" 
              "Falguni TV"
              "Green TV" 
              "Channel S BD" 
              "Nexus TV" 
              "Desh Bidesh" 
              "Jago TV" 
              "Jagoron" 
              "Jagoroni" 
              "Deshi TV" 
              "Music Bangla" 
              "Music Bangla" 
              "PCV" 
              "Rajdhani TV" 
              "Rongeen TV" 
              "ME TV" 
              "TBN 24" 
              "Probashi TV" 
