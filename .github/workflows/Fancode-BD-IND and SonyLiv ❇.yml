name: Fancode-BD-IND and SonyLiv ❇

on:
  schedule:
    - cron: '*/20 * * * *'  # প্রতি 20 মিনিটে (0,20,40 মিনিটে)
  workflow_dispatch:       # ম্যানুয়াল রান করার অপশন

jobs:
  update-playlists:
    runs-on: ubuntu-latest

    steps:
      # শুধুমাত্র পাবলিক প্লেলিস্ট রিপোজিটরি ক্লোন করুন (যেখানে .m3u ফাইল থাকবে)
      - name: Checkout playlist repository (public)
        uses: actions/checkout@v3
        with:
          repository: buzzinguaecn/Pizza
          token: ${{ secrets.PAT_TOKEN }}
          path: ./playlist-repo
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz

      - name: Update BD, IND and SonyLiv playlists
        run: |
          cd playlist-repo
          cat > update_playlists.py << 'EOF'
          import json
          import requests
          from datetime import datetime
          import os
          import pytz

          # JSON ফাইলের URLs
          FANCODE_JSON_URL = "https://raw.githubusercontent.com/buzzinguaecn/Pizza/main/fancode.json"
          SONYLIV_JSON_URL = "https://raw.githubusercontent.com/buzzinguaecn/Pizza/main/SonyLiv.json"
          
          def load_json_from_url(url, filename):
              """URL থেকে JSON লোড করা"""
              try:
                  response = requests.get(url, timeout=10)
                  response.raise_for_status()
                  data = response.json()
                  print(f"Loaded JSON from URL: {url}")
                  return data
              except Exception as e:
                  print(f"Error fetching JSON from URL {url}: {e}")
                  # যদি URL থেকে লোড না হয়, তাহলে লোকাল ফাইল চেষ্টা করুন
                  try:
                      with open(filename, 'r', encoding='utf-8') as f:
                          data = json.load(f)
                      print(f"Loaded JSON from local file: {filename}")
                      return data
                  except FileNotFoundError:
                      print(f"Error loading JSON from local file: {filename}")
                      return None

          def get_bangladesh_time():
              """বাংলাদেশ সময় পাওয়া"""
              bd_tz = pytz.timezone('Asia/Dhaka')
              bd_time = datetime.now(bd_tz)
              return bd_time

          def format_bangladesh_time(bd_time):
              """বাংলাদেশ সময় ফরম্যাট করা"""
              # AM/PM নির্ধারণ
              am_pm = "am" if bd_time.hour < 12 else "pm"
              
              # 12-hour ফরম্যাটে সময়
              hour_12 = bd_time.hour % 12
              if hour_12 == 0:
                  hour_12 = 12
              
              # দিন-মাস-বছর ফরম্যাট
              day_month_year = bd_time.strftime("%d-%m-%Y")
              
              # টাইম ফরম্যাট
              time_str = f"{hour_12:02d}:{bd_time.minute:02d}:{bd_time.second:02d}{am_pm}"
              
              return f"{time_str} - {day_month_year}"

          def extract_fancode_streams(data, country_code):
              """Fancode JSON থেকে স্ট্রিম ডেটা এক্সট্র্যাক্ট করা"""
              streams = []
              
              if "matches" not in data:
                  print("No 'matches' found in JSON")
                  return streams
              
              for match in data["matches"]:
                  # শুধুমাত্র adfree_url থাকলে নিবে
                  if "adfree_url" in match and match["adfree_url"]:
                      # country_code অনুযায়ী URL পরিবর্তন
                      stream_url = match["adfree_url"]
                      
                      if country_code == "bd":
                          # BD playlist: https://bd-mc-fdlive.fancode.com/...
                          if "https://in-" in stream_url:
                              stream_url = stream_url.replace("https://in-", "https://bd-")
                          elif "https://mc-fdlive.fancode.com" in stream_url:
                              stream_url = stream_url.replace("https://mc-fdlive", "https://bd-mc-fdlive")
                      elif country_code == "in":
                          # IN playlist: https://in-mc-fdlive.fancode.com/...
                          if "https://bd-" in stream_url:
                              stream_url = stream_url.replace("https://bd-", "https://in-")
                          elif "https://mc-fdlive.fancode.com" in stream_url:
                              stream_url = stream_url.replace("https://mc-fdlive", "https://in-mc-fdlive")
                      
                      # লগো URL পাওয়া (src থেকে)
                      logo_url = ""
                      if "src" in match:
                          logo_url = match["src"]
                      
                      # টাইটেল পাওয়া
                      title = match.get("title", "Unknown")
                      
                      # EXTINF entry তৈরি
                      extinf_entry = {
                          "title": title,
                          "logo": logo_url,
                          "group": "Live Event",
                          "stream_url": stream_url
                      }
                      streams.append(extinf_entry)
              
              return streams

          def extract_sonyliv_streams(data):
              """SonyLiv JSON থেকে স্ট্রিম ডেটা এক্সট্র্যাক্ট করা (শুধু isLive: true যুক্ত ম্যাচের জন্য)"""
              streams = []
              
              if "matches" not in data:
                  print("No 'matches' found in SonyLiv JSON")
                  return streams
              
              for match in data["matches"]:
                  # শুধুমাত্র isLive true থাকলেই নিবে
                  if match.get("isLive") == True:
                      # video_url থেকে স্ট্রিমিং লিংক
                      stream_url = match.get("video_url", "")
                      if not stream_url:
                          stream_url = match.get("dai_url", "")
                      if not stream_url:
                          stream_url = match.get("pub_url", "")
                      
                      if stream_url:
                          # লোগো URL (src থেকে)
                          logo_url = match.get("src", "")
                          
                          # ম্যাচের নাম (match_name থেকে)
                          title = match.get("match_name", "Unknown Event")
                          
                          # EXTINF entry তৈরি
                          extinf_entry = {
                              "title": title,
                              "logo": logo_url,
                              "group": "SonyLiv Event",  # নির্দিষ্ট গ্রুপ টাইটেল
                              "stream_url": stream_url
                          }
                          streams.append(extinf_entry)
                          print(f"Added SonyLiv stream: {title[:50]}...")
              
              return streams

          def create_m3u_content(streams, playlist_name):
              """M3U প্লেলিস্ট কন্টেন্ট তৈরি করা"""
              # বাংলাদেশ সময় পাওয়া এবং ফরম্যাট করা
              bd_time = get_bangladesh_time()
              update_time = format_bangladesh_time(bd_time)
              
              content = [
                  "#EXTM3U",
                  "# 👉 All links included in this file have been collected from publicly available sources. If any content owner wishes to have their source removed, please feel free to contact us. We deeply respect your work and opinions, and we will promptly honor your request without any objection.",
                  "# 👉 Please note that neither I nor our team own any of the TV channels listed here. All channels belong to their respective owners. We only collect and share freely available sources so that everyone can enjoy them easily. These streaming links are widely accessible across many platforms on the internet. Our intention is solely for entertainment purposes.",
                  "# 👉 If you find any of your content or source in our playlist and would like it to be removed, please feel free to contact us via inbox. We will take immediate action. 👈",
                  f"#Update Time ✔️: {update_time} (Bangladesh Time)",
                  "#Telegram 🔗: https://contact2.me/lpMKn8",
                  "#WEB TV 📺: https://contact2.me/lpMKn8",
                  "",  # ১ম গ্যাফ লাইন
                  "",  # ২য় গ্যাফ লাইন
                  "",  # ৩য় গ্যাফ লাইন
                  ""   # ৪র্থ গ্যাফ লাইন
              ]
              
              for i, stream in enumerate(streams):
                  # tvg-logo এবং group-title যোগ করা
                  extinf_line = f'#EXTINF:-1 tvg-logo="{stream["logo"]}" group-title="{stream["group"]}", {stream["title"]}'
                  content.append(extinf_line)
                  content.append(stream["stream_url"])
                  
                  # প্রতিটি #EXTINF এন্ট্রির পর দুই লাইন গ্যাপ দিতে হবে (শেষ এন্ট্রি বাদে)
                  if i < len(streams) - 1:
                      content.append("")
                      content.append("")
              
              return "\n".join(content)

          def update_playlist_file(filename, content):
              """ফাইলে m3u কন্টেন্ট লিখা"""
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f"Updated {filename} - {len(content.splitlines())} lines")

          # ==================== FANCODE প্লেলিস্ট আপডেট ====================
          print("\n" + "="*50)
          print("Updating Fancode Playlists")
          print("="*50)
          
          fancode_data = load_json_from_url(FANCODE_JSON_URL, 'fancode.json')
          
          if fancode_data:
              # BD প্লেলিস্টের জন্য স্ট্রিমস
              bd_streams = extract_fancode_streams(fancode_data, "bd")
              print(f"Found {len(bd_streams)} streams for BD playlist")
              
              # IN প্লেলিস্টের জন্য স্ট্রিমস
              in_streams = extract_fancode_streams(fancode_data, "in")
              print(f"Found {len(in_streams)} streams for IN playlist")
              
              # M3U কন্টেন্ট তৈরি
              bd_content = create_m3u_content(bd_streams, "Fancode Bangladesh")
              in_content = create_m3u_content(in_streams, "Fancode India")
              
              # ফাইল আপডেট
              update_playlist_file("fancodeBD.m3u", bd_content)
              update_playlist_file("fancodeIND.m3u", in_content)
          else:
              print("Failed to load Fancode JSON data")

          # ==================== SONYLIV প্লেলিস্ট আপডেট ====================
          print("\n" + "="*50)
          print("Updating SonyLiv Playlist")
          print("="*50)
          
          sonyliv_data = load_json_from_url(SONYLIV_JSON_URL, 'SonyLiv.json')
          
          if sonyliv_data:
              # SonyLiv স্ট্রিমস এক্সট্র্যাক্ট (শুধু isLive: true যুক্ত)
              sonyliv_streams = extract_sonyliv_streams(sonyliv_data)
              print(f"Found {len(sonyliv_streams)} live streams for SonyLiv playlist")
              
              # SonyLiv M3U কন্টেন্ট তৈরি
              sonyliv_content = create_m3u_content(sonyliv_streams, "SonyLiv")
              
              # SonyLiv.m3u ফাইল আপডেট
              update_playlist_file("SonyLiv.m3u", sonyliv_content)
          else:
              print("Failed to load SonyLiv JSON data")
          
          print(f"\n✅ All playlists updated successfully at {datetime.now()}")
          EOF
          
          # Python স্ক্রিপ্ট রান করুন
          python update_playlists.py

      - name: Check changes in playlist repo
        run: |
          echo "🔍 Checking changes in playlist repository..."
          cd playlist-repo
          git status
          echo ""
          echo "📊 File diffs:"
          git diff fancodeBD.m3u || echo "No changes in fancodeBD.m3u"
          echo ""
          git diff fancodeIND.m3u || echo "No changes in fancodeIND.m3u"
          echo ""
          git diff SonyLiv.m3u || echo "No changes in SonyLiv.m3u"

      - name: Commit and push changes to playlist repo
        run: |
          echo "💾 Committing changes to playlist repository..."
          
          cd playlist-repo
          
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          git add fancodeBD.m3u fancodeIND.m3u SonyLiv.m3u
          
          # পরিবর্তন হয়েছে কিনা চেক করা
          if git diff --staged --quiet; then
            echo "🟡 No changes to commit (files are identical)"
          else
            # বাংলাদেশ সময় পাওয়া
            CURRENT_TIME=$(TZ="Asia/Dhaka" date +'%I:%M:%S %p %d-%m-%Y')
            
            # শিডিউলড আপডেট নাকি ম্যানুয়াল চেক করা
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              COMMIT_MSG="🆗 FANCODE & SONYLIV 🤖 Sports 🆗 Started at $CURRENT_TIME"
            else
              COMMIT_MSG="🆗 FANCODE & SONYLIV 🤖 Sports 🔄 Updated Done ✅ at $CURRENT_TIME"
            fi
            
            git commit -m "$COMMIT_MSG"
            git push origin main
            echo "✅ Changes committed and pushed successfully to playlist repository!"
            
            # লিঙ্ক দেখানো
            echo ""
            echo "🌐 Updated files available at:"
            echo "https://github.com/buzzinguaecn/Pizza/blob/main/fancodeBD.m3u"
            echo "https://github.com/buzzinguaecn/Pizza/blob/main/fancodeIND.m3u"
            echo "https://github.com/buzzinguaecn/Pizza/blob/main/SonyLiv.m3u"
          fi

      - name: Clean up
        run: |
          echo "🧹 Cleaning up temporary files..."
          rm -rf playlist-repo
