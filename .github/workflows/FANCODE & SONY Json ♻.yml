name: FANCODE & SONY Json ♻
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout workflow repository (JobFile)
      uses: actions/checkout@v4
      with:
        repository: sujukichinna4321/JobFile
        token: ${{ secrets.PAT_TOKEN }}
        path: ./workflow-repo

    - name: Checkout Pizza repository (buzzinguaecn/Pizza)
      uses: actions/checkout@v4
      with:
        repository: buzzinguaecn/Pizza
        token: ${{ secrets.PAT_TOKEN }}
        path: ./Pizza-repo

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install requests pytz

    - name: Download and update JSON
      env:
        JSON_URL: ${{ secrets.FANCODE_JSON }}
      run: |
        import os
        import requests
        import json
        from datetime import datetime
        import pytz
        import re
        
        print("🚀 Starting JSON update process...")
        
        json_url = os.environ.get('JSON_URL')
        
        if not json_url:
            print("❌ Error: JSON_URL environment variable is empty!")
            exit(1)
        
        print(f"📥 Source URL: {json_url}")
        
        try:
            response = requests.get(json_url, timeout=10)
            response.raise_for_status()
            original_data = response.json()
            print("✅ Successfully downloaded JSON data")
        except Exception as e:
            print(f"❌ Download failed: {e}")
            exit(1)
        
        def clean_title(title):
            """টাইটেল থেকে কমা বাদ দেয়ার ফাংশন"""
            if not isinstance(title, str):
                return title
            
            # রেগুলার এক্সপ্রেশন: বন্ধনীর ভিতরে থাকা কমা বাদ দিবে
            # যেমন: (Super Cola National T20 Cup, 2026) → (Super Cola National T20 Cup 2026)
            pattern = r'\(([^)]+)\)'
            
            def remove_comma_in_parenthesis(match):
                inner_text = match.group(1)
                # কমা বাদ দিয়ে স্পেস যোগ করা
                cleaned_inner = re.sub(r',\s*', ' ', inner_text)
                return f'({cleaned_inner})'
            
            cleaned_title = re.sub(pattern, remove_comma_in_parenthesis, title)
            
            if cleaned_title != title:
                print(f"   🔄 Title cleaned: {title[:50]}... → {cleaned_title[:50]}...")
            
            return cleaned_title
        
        def replace_url(url):
            """URL প্রতিস্থাপন ফাংশন"""
            if not isinstance(url, str):
                return url
            
            original_url = url
            
            # 1. fdlive → fblive পরিবর্তন
            if "fdlive" in url:
                url = url.replace("fdlive", "fblive")
                print(f"   🔄 fdlive → fblive")
            
            # 2. in-mc → bd-mc পরিবর্তন
            if "in-mc" in url:
                url = url.replace("in-mc", "bd-mc")
                print(f"   🔄 in-mc → bd-mc")
            
            # 3. dai-partner.fancode.com/primary/ → bd-mc-fblive.fancode.com/mumbai/
            if "https://dai-partner.fancode.com/primary/" in url:
                old_prefix = "https://dai-partner.fancode.com/primary/"
                remaining = url.replace(old_prefix, "")
                url = "https://bd-mc-fblive.fancode.com/mumbai/" + remaining
                print(f"   🔄 dai-partner → bd-mc-fblive")
            
            # 4. in-mc-fblive → bd-mc-fblive (যদি আগে না হয়ে থাকে)
            if "https://in-mc-fblive.fancode.com" in url:
                url = url.replace("https://in-mc-fblive.fancode.com", "https://bd-mc-fblive.fancode.com")
                print(f"   🔄 in-mc-fblive → bd-mc-fblive")
            
            if url != original_url:
                print(f"      Old: {original_url[:80]}...")
                print(f"      New: {url[:80]}...")
            
            return url
        
        # matches ডাটা নেয়া
        matches = original_data.get("matches", [])
        
        # প্রতিটি match পরিবর্তন করা
        modified_matches = []
        adfree_replaced = 0
        dai_replaced = 0
        fdlive_replaced = 0
        in_mc_replaced = 0
        title_cleaned = 0
        
        for match in matches:
            if isinstance(match, dict):
                # টাইটেল ক্লিন করা
                if "title" in match:
                    old_title = match.get("title", "")
                    if old_title:
                        new_title = clean_title(old_title)
                        if new_title != old_title:
                            match["title"] = new_title
                            title_cleaned += 1
                
                # adfree_url ফিল্ড পরিবর্তন
                if "adfree_url" in match:
                    old_url = match.get("adfree_url", "")
                    if old_url:
                        new_url = replace_url(old_url)
                        if new_url != old_url:
                            match["adfree_url"] = new_url
                            adfree_replaced += 1
                            if "fdlive" in old_url:
                                fdlive_replaced += 1
                            if "in-mc" in old_url:
                                in_mc_replaced += 1
                
                # dai_url ফিল্ড পরিবর্তন
                if "dai_url" in match:
                    old_url = match.get("dai_url", "")
                    if old_url:
                        new_url = replace_url(old_url)
                        if new_url != old_url:
                            match["dai_url"] = new_url
                            dai_replaced += 1
                            if "fdlive" in old_url:
                                fdlive_replaced += 1
                            if "in-mc" in old_url:
                                in_mc_replaced += 1
            
            modified_matches.append(match)
        
        print(f"\n✅ Summary:")
        print(f"   - adfree_url replaced: {adfree_replaced}")
        print(f"   - dai_url replaced: {dai_replaced}")
        print(f"   - fdlive → fblive replaced: {fdlive_replaced}")
        print(f"   - in-mc → bd-mc replaced: {in_mc_replaced}")
        print(f"   - Titles cleaned (commas removed): {title_cleaned}")
        
        # বাংলাদেশ টাইমজোন
        bd_timezone = pytz.timezone('Asia/Dhaka')
        current_time = datetime.now(bd_timezone)
        formatted_time = current_time.strftime("%I:%M:%S %p %d-%m-%Y")
        
        # নতুন JSON তৈরি
        updated_data = {
            "name": "Fancode Live Matches Data in Json",
            "telegram": "https://contact2.me/lpMKn8",
            "last update time": formatted_time,
            "webtv": "https://contact2.me/lpMKn8",
            "matches": modified_matches
        }
        
        # ফাইল সেভ
        output_file = 'Pizza-repo/Fancode.json'
        with open(output_file, 'w', encoding='utf-8') as f:
            json.dump(updated_data, f, indent=4, ensure_ascii=False)
        
        print(f"\n✅ JSON updated successfully at {formatted_time}")
        
        # ভেরিফিকেশন
        print("\n🔍 Verification:")
        with open(output_file, 'r', encoding='utf-8') as f:
            content = f.read()
            
            # fdlive চেক
            if "fdlive" in content:
                print("   ⚠️ WARNING: Still found 'fdlive' in file!")
            else:
                print("   ✅ No 'fdlive' found - replacement successful!")
            
            # in-mc চেক
            if "in-mc" in content:
                print("   ⚠️ WARNING: Still found 'in-mc' in file!")
            else:
                print("   ✅ No 'in-mc' found - replacement successful!")
            
            # কমা চেক (টাইটেলের ভিতরে)
            comma_pattern = r'"title":\s*"[^"]*\([^)]*,[^)]*\)[^"]*"'
            if re.search(comma_pattern, content):
                print("   ⚠️ WARNING: Commas still found inside titles!")
            else:
                print("   ✅ No commas found inside titles - cleaning successful!")
            
            if "bd-mc" in content:
                print("   ✅ 'bd-mc' pattern found in file")
      shell: python

    - name: Update SonyLiv JSON
      env:
        SONY_LIV_JSON_URL: ${{ secrets.SONY_LIV_JSON }}
      run: |
        import os
        import requests
        import json
        from datetime import datetime
        import pytz
        
        print("\n🚀 Starting SonyLiv JSON update process...")
        
        sony_url = os.environ.get('SONY_LIV_JSON_URL')
        
        if not sony_url:
            print("❌ Error: SONY_LIV_JSON_URL environment variable is empty!")
            exit(1)
        
        print(f"📥 SonyLiv Source URL: {sony_url}")
        
        try:
            response = requests.get(sony_url, timeout=10)
            response.raise_for_status()
            sony_data = response.json()
            print("✅ Successfully downloaded SonyLiv JSON data")
        except Exception as e:
            print(f"❌ SonyLiv download failed: {e}")
            exit(1)
        
        # matches ডাটা নেয়া
        matches = sony_data.get("matches", [])
        
        # বাংলাদেশ টাইমজোন
        bd_timezone = pytz.timezone('Asia/Dhaka')
        current_time = datetime.now(bd_timezone)
        formatted_time = current_time.strftime("%I:%M:%S %p %d-%m-%Y")
        
        # নতুন SonyLiv JSON তৈরি
        updated_sony_data = {
            "name": "SonyLiv Live Matches Data in Json",
            "telegram": "https://contact2.me/lpMKn8",
            "last update time": formatted_time,
            "webtv": "https://contact2.me/lpMKn8",
            "matches": matches
        }
        
        # SonyLiv ফাইল সেভ
        sony_output_file = 'Pizza-repo/SonyLiv.json'
        with open(sony_output_file, 'w', encoding='utf-8') as f:
            json.dump(updated_sony_data, f, indent=4, ensure_ascii=False)
        
        print(f"\n✅ SonyLiv JSON updated successfully at {formatted_time}")
        print(f"📁 Saved to: {sony_output_file}")
        
        # ভেরিফিকেশন
        print("\n🔍 SonyLiv Verification:")
        with open(sony_output_file, 'r', encoding='utf-8') as f:
            content = f.read()
            if "Sonyliv Live Matches Data in Json" in content:
                print("   ⚠️ Old name found in content (should be updated!)")
            else:
                print("   ✅ New name 'SonyLiv Live Matches Data in Json' applied")
            
            if "t.me/+rQTz5VL8CRpjNTZl" in content:
                print("   ⚠️ Old telegram link found!")
            else:
                print("   ✅ New telegram link 'https://contact2.me/lpMKn8' applied")
      shell: python

    - name: Check changes
      working-directory: ./Pizza-repo
      run: |
        echo "🔍 Checking git status..."
        git status
        
        echo ""
        echo "📊 Checking for 'fdlive' in Fancode.json:"
        if grep -n "fdlive" Fancode.json; then
          echo "❌ ERROR: 'fdlive' still exists!"
          exit 1
        else
          echo "✅ No 'fdlive' found"
        fi
        
        echo ""
        echo "📊 Checking for 'in-mc' in Fancode.json:"
        if grep -n "in-mc" Fancode.json; then
          echo "❌ ERROR: 'in-mc' still exists!"
          exit 1
        else
          echo "✅ No 'in-mc' found"
        fi
        
        echo ""
        echo "📊 Checking for commas inside titles in Fancode.json:"
        if grep -E '"title":.*\(.*,.*\)' Fancode.json; then
          echo "❌ ERROR: Commas still found inside titles!"
          exit 1
        else
          echo "✅ No commas found inside titles"
        fi
        
        echo ""
        echo "📊 Checking for 'bd-mc' in Fancode.json:"
        grep -n "bd-mc" Fancode.json | head -5 || echo "No bd-mc URLs found"
        
        echo ""
        echo "📊 SonyLiv.json content check:"
        echo "First 20 lines of SonyLiv.json:"
        head -20 SonyLiv.json
        
        echo ""
        echo "📊 SonyLiv.json matches count:"
        grep -c '"match_name"' SonyLiv.json || echo "0 matches found"

    - name: Commit and push changes
      working-directory: ./Pizza-repo
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        git add Fancode.json SonyLiv.json
        
        if git diff --staged --quiet; then
          echo "🟡 No changes to commit"
        else
          CURRENT_TIME=$(date +'%I:%M:%S %p %d-%m-%Y')
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            COMMIT_MSG="🆗 FANCODE & SONY 🤖 JSON 🆗 Started at $CURRENT_TIME"
          else
            COMMIT_MSG="🆗 FANCODE & SONY 🤖 JSON 🔄 Updated Done ✅ at $CURRENT_TIME"
          fi
          
          git commit -m "$COMMIT_MSG"
          git push origin main
          echo "✅ Changes committed and pushed!"
        fi

    - name: Clean up
      if: always()
      run: |
        rm -rf workflow-repo
        rm -rf Pizza-repo
