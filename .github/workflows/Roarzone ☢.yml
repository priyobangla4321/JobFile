name: Roarzone ☢

on:
  schedule:
    - cron: '*/20 * * * *'  # 0,20,40 মিনিটে
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-playlist:
    runs-on: ubuntu-latest
    
    steps:
      # ধাপ ১: বর্তমান workflow রিপো চেকআউট (sujukichinna4321/JobFile)
      - name: Checkout workflow repository (JobFile)
        uses: actions/checkout@v4
        with:
          repository: sujukichinna4321/JobFile
          token: ${{ secrets.PAT_TOKEN }}
          path: ./workflow-repo
          
      # ধাপ ২: টার্গেট রিপো চেকআউট (buzzinguaecn/Pizza - যেখানে m3u ফাইল আপডেট হবে)
      - name: Checkout playlist repository (buzzinguaecn/Pizza)
        uses: actions/checkout@v4
        with:
          repository: buzzinguaecn/Pizza
          token: ${{ secrets.PAT_TOKEN }}
          path: ./Pizza-repo
          
      - name: Get current time
        id: time
        uses: josStorer/get-current-time@v2.0.2
        with:
          format: 'YYYY-MM-DD HH:mm:ss'
          timezone: 'Asia/Dhaka'
          
      # ধাপ ৩: চেক করা এটি প্রথম রান কিনা
      - name: Check if first run
        id: check_first
        working-directory: ./Pizza-repo
        run: |
          # চেক করা Roarzone.m3u ফাইল আছে কিনা
          if [ ! -f "Roarzone.m3u" ]; then
            echo "FIRST_RUN=true" >> $GITHUB_OUTPUT
            echo "✅ Detected: First run (Roarzone.m3u does not exist)"
          else
            echo "FIRST_RUN=false" >> $GITHUB_OUTPUT
            echo "✅ Detected: Scheduled update (Roarzone.m3u exists)"
          fi
          
      - name: Fetch and update playlist
        id: fetch-playlist
        working-directory: ./Pizza-repo
        run: |
          # সিক্রেট থেকে প্লেলিস্ট লিংক পড়া
          if [ -z "${{ secrets.ROARZONE }}" ]; then
            echo "❌ Error: ROARZONE secret is not set"
            echo "ℹ️ Please add the secret in GitHub repository settings"
            exit 1
          fi
          
          echo "📥 Downloading playlist from secret URL..."
          
          # প্লেলিস্ট ডাউনলোড করা (timeout সহ)
          curl -s --max-time 30 "${{ secrets.ROARZONE }}" -o temp_playlist.m3u
          CURL_EXIT_CODE=$?
          
          if [ $CURL_EXIT_CODE -ne 0 ]; then
            echo "❌ Error: Curl failed with exit code $CURL_EXIT_CODE"
            echo "ℹ️ Trying without silent mode to see error..."
            curl -L --max-time 30 "${{ secrets.ROARZONE }}" -o temp_playlist.m3u
            exit 1
          fi
          
          # ফাইল এক্সিস্ট চেক
          if [ ! -s temp_playlist.m3u ]; then
            echo "❌ Error: Failed to download playlist or file is empty"
            exit 1
          fi
          
          # ডাউনলোড সফল
          echo "✅ Playlist downloaded successfully"
          DOWNLOAD_LINES=$(wc -l < temp_playlist.m3u)
          echo "📊 Downloaded file size: $DOWNLOAD_LINES lines"
          
          # হেডার তৈরি করা
          echo "#EXTM3U" > Roarzone.m3u
          echo "# 👉 All links included in this file have been collected from publicly available sources. If any content owner wishes to have their source removed, please feel free to contact us. We deeply respect your work and opinions, and we will promptly honor your request without any objection." >> Roarzone.m3u
          echo "# 👉 Please note that neither I nor our team own any of the TV channels listed here. All channels belong to their respective owners. We only collect and share freely available sources so that everyone can enjoy them easily. These streaming links are widely accessible across many platforms on the internet. Our intention is solely for entertainment purposes." >> Roarzone.m3u
          echo "# 👉 If you find any of your content or source in our playlist and would like it to be removed, please feel free to contact us via inbox. We will take immediate action. 👈" >> Roarzone.m3u
          echo "# 👉 Inbox Us: https://contact2.me/lpMKn8 👈" >> Roarzone.m3u
          echo "#Update Time ✔️: ${{ steps.time.outputs.formattedTime }} (Bangladesh Time)" >> Roarzone.m3u
          echo "" >> Roarzone.m3u
          
          # আসল প্লেলিস্ট কন্টেন্ট যোগ করা (প্রথম লাইন #EXTM3U বাদ দিয়ে)
          tail -n +2 temp_playlist.m3u >> Roarzone.m3u
          
          # ফাইল সাইজ চেক
          LINES=$(wc -l < Roarzone.m3u)
          CHANNEL_COUNT=$(grep -c "^#EXTINF:-1" Roarzone.m3u 2>/dev/null || echo "0")
          echo "📊 Final playlist size: $LINES lines"
          echo "📺 Channel count: $CHANNEL_COUNT"
          
          # কমপক্ষে ১০ লাইন আছে কিনা চেক
          if [ "$LINES" -lt 10 ]; then
            echo "⚠️ Warning: Playlist seems very small ($LINES lines)"
          else
            echo "✅ Playlist looks good with $LINES lines and $CHANNEL_COUNT channels"
          fi
          
          # টেম্প ফাইল ডিলিট
          rm -f temp_playlist.m3u
          
      - name: Check if playlist changed
        id: check_changes
        working-directory: ./Pizza-repo
        run: |
          changes_detected=false
          
          echo "🔍 Checking for changes in playlist..."
          
          if [ -f "Roarzone.m3u" ] && [ -s "Roarzone.m3u" ]; then
            # ফাইল এক্সিস্ট করলে changes চেক করুন
            if ! git diff --quiet Roarzone.m3u; then
              changes_detected=true
              echo "🔄 Changes detected in Roarzone.m3u"
              
              # পরিবর্তনের বিস্তারিত দেখান
              echo "📊 Changes summary:"
              git diff --stat Roarzone.m3u
              
              # লাইন সংখ্যার পরিবর্তন দেখান
              OLD_LINES=$(git show HEAD:Roarzone.m3u 2>/dev/null | wc -l || echo "0")
              NEW_LINES=$(wc -l < Roarzone.m3u)
              DIFF=$((NEW_LINES - OLD_LINES))
              echo "📈 Line count change: $DIFF lines ($OLD_LINES → $NEW_LINES)"
            else
              echo "✅ No content changes detected"
            fi
          else
            changes_detected=true
            echo "📝 New Roarzone.m3u file will be created"
          fi
          
          echo "changes_detected=$changes_detected" >> $GITHUB_OUTPUT
          
      - name: Commit and push changes to playlist repo
        if: steps.check_changes.outputs.changes_detected == 'true'
        working-directory: ./Pizza-repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # changes staged করা
          git add Roarzone.m3u
          
          # প্রথম রান কিনা চেক করে আলাদা commit message
          if [ "${{ steps.check_first.outputs.FIRST_RUN }}" = "true" ]; then
            COMMIT_MSG="🆗 Roarzone ☢ : 🆕 Start Done ✅ - at ${{ steps.time.outputs.formattedTime }}"
            echo "📝 First run commit message"
          else
            # ম্যানুয়াল বা স্কিডিউলড চেক
            if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              COMMIT_MSG="🆗 Roarzone ☢ : 🆕 Start Done ✅ - at ${{ steps.time.outputs.formattedTime }}"
              echo "📝 Manual trigger commit message"
            else
              COMMIT_MSG="🆗 Roarzone ☢ : 🔄 Updated Done ✅ - at ${{ steps.time.outputs.formattedTime }}"
              echo "📝 Scheduled update commit message"
            fi
          fi
          
          echo "📝 Commit message: $COMMIT_MSG"
          git commit -m "$COMMIT_MSG"
          
          echo "🚀 Pushing changes to playlist repository (buzzinguaecn/Pizza)..."
          git push
          
          # সফল মেসেজ
          echo "✅ Playlist updated successfully!"
          echo "📊 Final playlist stats:"
          LINES=$(wc -l < Roarzone.m3u)
          CHANNELS=$(grep -c "^#EXTINF:-1" Roarzone.m3u 2>/dev/null || echo "0")
          echo "   - Total lines: $LINES"
          echo "   - Total channels: $CHANNELS"
          echo "🕐 Next auto-sync in 20 minutes"
          
      - name: No changes detected
        if: steps.check_changes.outputs.changes_detected == 'false'
        run: |
          echo "✅ No changes detected in playlist"
          echo "🕐 Last checked: ${{ steps.time.outputs.formattedTime }}"
          echo "⏰ Next check in 20 minutes"
          
      - name: Clean up
        if: always()
        run: |
          echo "🧹 Cleaning up temporary files..."
          rm -rf ./Pizza-repo
          rm -rf ./workflow-repo
          echo "✅ Cleanup completed!"
          
      # ধাপ ৬: শেষে রান স্ট্যাটাস দেখানো
      - name: Display run summary
        if: always()
        run: |
          echo "=== 📋 Workflow Run Summary ==="
          echo "📌 Run Type: ${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Scheduled' }}"
          echo "📌 First Run: ${{ steps.check_first.outputs.FIRST_RUN }}"
          echo "📌 Changes Detected: ${{ steps.check_changes.outputs.changes_detected }}"
          echo "📌 Time: ${{ steps.time.outputs.formattedTime }} (Bangladesh Time)"
          echo "================================"
          
      - name: Success Notification
        if: success()
        run: |
          echo "🎊 Roarzone ☢ workflow completed successfully!"
          echo "📅 Next update in 20 minutes"
          echo "📁 Playlist updated in: buzzinguaecn/Pizza"
          
      - name: Failure Notification
        if: failure()
        run: |
          echo "❌ Roarzone ☢ workflow failed!"
          echo "Please check the logs for errors."
          echo "Common issues:"
          echo "  - PAT_TOKEN secret not set correctly"
          echo "  - ROARZONE secret not set or invalid URL"
          echo "  - Network issues downloading playlist"
