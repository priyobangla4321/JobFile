name: Fancode m3u8 🇧🇩

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target playlist repository (sirometv/playlist)
        uses: actions/checkout@v4
        with:
          repository: sirometv/playlist
          token: ${{ secrets.PAT_TOKEN }}
          path: playlist-repo

      - name: Download main playlist from secret URL
        run: |
          curl -L "${{ secrets.Fancode_2026 }}" -o main_playlist.m3u

      - name: Process playlist and generate m3u8 files (with EXT-X-STREAM-INF)
        run: |
          python3 << 'EOF'
          import os
          import re
          import json
          from collections import defaultdict

          # ---------- Known resolution mappings (bandwidth & resolution) ----------
          RES_MAP = {
              '240': {'bandwidth': 300000, 'resolution': '426x240'},
              '360': {'bandwidth': 600000, 'resolution': '640x360'},
              '480': {'bandwidth': 800000, 'resolution': '854x480'},
              '540': {'bandwidth': 900000, 'resolution': '960x540'},
              '720': {'bandwidth': 1500000, 'resolution': '1280x720'},
              '1080': {'bandwidth': 3000000, 'resolution': '1920x1080'},
              '2160': {'bandwidth': 12000000, 'resolution': '3840x2160'},
          }

          playlist_file = "main_playlist.m3u"
          output_dir = "playlist-repo/fancode"
          mapping_file = os.path.join(output_dir, "mapping.json")
          os.makedirs(output_dir, exist_ok=True)

          # ---------- Load existing mapping ----------
          mapping = {}
          if os.path.exists(mapping_file):
              with open(mapping_file, 'r', encoding='utf-8') as f:
                  mapping = json.load(f)

          # ---------- Parse main playlist ----------
          with open(playlist_file, 'r', encoding='utf-8') as f:
              lines = f.readlines()

          groups = defaultdict(lambda: {
              "tvg_id": "",
              "tvg_logo": "",
              "tvg_language": "",
              "group_title": "",
              "urls": {}          # key: resolution (e.g., '240'), value: cleaned URL
          })

          i = 0
          while i < len(lines):
              line = lines[i].strip()
              if line.startswith("#EXTINF:"):
                  tvg_id = re.search(r'tvg-id="([^"]*)"', line)
                  tvg_id = tvg_id.group(1) if tvg_id else ""

                  tvg_logo = re.search(r'tvg-logo="([^"]*)"', line)
                  tvg_logo = tvg_logo.group(1) if tvg_logo else ""

                  tvg_language = re.search(r'tvg-language="([^"]*)"', line)
                  tvg_language = tvg_language.group(1) if tvg_language else ""

                  group_title = re.search(r'group-title="([^"]*)"', line)
                  group_title = group_title.group(1) if group_title else ""

                  title_part = line.split(',', 1)[-1].strip()
                  res_match = re.search(r'(\d+)p', title_part)
                  resolution = res_match.group(1) if res_match else ""

                  if i + 1 < len(lines):
                      raw_url = lines[i+1].strip()
                      clean_url = raw_url.split('|')[0].strip()
                      if tvg_id and resolution:
                          groups[tvg_id]["tvg_id"] = tvg_id
                          groups[tvg_id]["tvg_logo"] = tvg_logo
                          groups[tvg_id]["tvg_language"] = tvg_language
                          groups[tvg_id]["group_title"] = group_title
                          groups[tvg_id]["urls"][resolution] = clean_url
                  i += 2
              else:
                  i += 1

          current_ids = set(groups.keys())
          existing_ids = set(mapping.keys())
          ids_to_remove = existing_ids - current_ids
          ids_to_add = current_ids - existing_ids

          used_numbers = set()
          for tvg_id in current_ids:
              if tvg_id in mapping:
                  used_numbers.add(mapping[tvg_id]["file"])

          next_number = max(used_numbers) + 1 if used_numbers else 1

          new_mapping = {}
          for tvg_id in current_ids:
              if tvg_id in mapping:
                  new_mapping[tvg_id] = mapping[tvg_id]
                  new_mapping[tvg_id]["group_title"] = groups[tvg_id]["group_title"]
                  new_mapping[tvg_id]["tvg_logo"] = groups[tvg_id]["tvg_logo"]
                  new_mapping[tvg_id]["tvg_language"] = groups[tvg_id]["tvg_language"]
              else:
                  new_mapping[tvg_id] = {
                      "file": next_number,
                      "group_title": groups[tvg_id]["group_title"],
                      "tvg_logo": groups[tvg_id]["tvg_logo"],
                      "tvg_language": groups[tvg_id]["tvg_language"]
                  }
                  next_number += 1

          # Remove obsolete files
          for tvg_id in ids_to_remove:
              file_num = mapping[tvg_id]["file"]
              file_path = os.path.join(output_dir, f"{file_num}.m3u8")
              if os.path.exists(file_path):
                  os.remove(file_path)
                  print(f"Removed obsolete file: {file_path}")

          # ---------- Generate/Update each m3u8 file with EXT-X-STREAM-INF ----------
          for tvg_id, data in groups.items():
              file_num = new_mapping[tvg_id]["file"]
              file_path = os.path.join(output_dir, f"{file_num}.m3u8")

              # Sort resolutions (e.g., 240, 360, ...)
              sorted_urls = sorted(data["urls"].items(), key=lambda x: int(x[0]) if x[0].isdigit() else 0)

              lines = ["#EXTM3U", ""]  # blank line after header (optional)
              for res, url in sorted_urls:
                  # Get bandwidth & resolution from map, or use defaults if unknown
                  if res in RES_MAP:
                      bw = RES_MAP[res]['bandwidth']
                      res_str = RES_MAP[res]['resolution']
                  else:
                      # Fallback: approximate values (you may adjust these)
                      width = int(res) * 16 // 9
                      bw = int(res) * 1250 * 100  # rough estimate
                      res_str = f"{width}x{res}"
                      print(f"Warning: no predefined mapping for {res}p, using approx: bandwidth={bw}, resolution={res_str}")

                  stream_inf = f'#EXT-X-STREAM-INF:BANDWIDTH={bw},RESOLUTION={res_str}'
                  lines.append(stream_inf)
                  lines.append(url)
                  lines.append("")   # blank line between entries (optional)

              content = "\n".join(lines)

              write_needed = True
              if os.path.exists(file_path):
                  with open(file_path, 'r', encoding='utf-8') as f:
                      old_content = f.read()
                  if old_content == content:
                      write_needed = False

              if write_needed:
                  with open(file_path, 'w', encoding='utf-8') as f:
                      f.write(content)
                  print(f"Updated: {file_path}")
              else:
                  print(f"No change: {file_path}")

          # Save updated mapping
          with open(mapping_file, 'w', encoding='utf-8') as f:
              json.dump(new_mapping, f, indent=2)

          EOF

      - name: Commit and push changes
        run: |
          cd playlist-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fancode/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update fancode m3u8 files (EXT-X-STREAM-INF format)"
            git push
          fi
