name: Yupp TV 🔴

on:
  schedule:
    # প্রতি ২০ মিনিট পর পর রান হবে
    - cron: '*/20 * * * *'
  workflow_dispatch:  # ম্যানুয়ালি রান করার অপশন

permissions:
  contents: write

jobs:
  sync-playlist:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout workflow repository (JobFile)
      uses: actions/checkout@v4
      with:
        repository: priyobangla4321/JobFile
        token: ${{ secrets.PAT_TOKEN }}
        path: ./workflow-repo
        
    - name: Checkout playlist repository (sirometv/playlist)
      uses: actions/checkout@v4
      with:
        repository: sirometv/playlist
        token: ${{ secrets.PAT_TOKEN }}
        path: ./playlist-repo
        
    - name: Setup Bangladesh timezone
      run: |
        echo "🌏 Setting up Bangladesh timezone..."
        # বাংলাদেশের টাইমজোন সেট আপ
        sudo timedatectl set-timezone Asia/Dhaka
        echo "✅ Bangladesh timezone set: $(TZ='Asia/Dhaka' date)"
        
    - name: Download and process YuppTV playlist
      working-directory: ./workflow-repo
      run: |
        echo "📥 Downloading and processing YuppTV playlist..."
        
        # বাংলাদেশের সময় দেখান
        BD_TIME=$(TZ='Asia/Dhaka' date +'%Y-%m-%d %H:%M:%S Bangladesh Time')
        BD_TIME_READABLE=$(TZ='Asia/Dhaka' date +'%A, %d %B %Y, %I:%M:%S %p Bangladesh Time')
        echo "🕐 Download started at: $BD_TIME_READABLE"
        
        # সিক্রেট URL চেক করুন
        echo "🔍 Checking secret URL..."
        SECRET_URL="${{ secrets.SIROME_YUPPTV }}"
        if [ -z "$SECRET_URL" ]; then
          echo "❌ Error: SIROME_YUPPTV secret is empty!"
          echo "ℹ️ Please check your repository secrets in GitHub Settings"
          exit 1
        fi
        
        echo "✅ Secret URL found (first 50 chars): ${SECRET_URL:0:50}..."
        
        # প্লেলিস্ট ডাউনলোড
        echo "📥 Downloading playlist..."
        curl -s -L -o source_playlist.m3u "$SECRET_URL"
        CURL_EXIT_CODE=$?
        
        if [ $CURL_EXIT_CODE -ne 0 ]; then
          echo "❌ Error: Curl failed with exit code $CURL_EXIT_CODE"
          echo "ℹ️ Trying without silent mode to see error..."
          curl -L -o source_playlist.m3u "$SECRET_URL"
          exit 1
        fi
        
        # ফাইল ডাউনলোড হয়েছে কিনা চেক করুন
        if [ -f "source_playlist.m3u" ] && [ -s "source_playlist.m3u" ]; then
          echo "✅ Source playlist downloaded successfully"
          echo "📊 Original file size: $(wc -l < source_playlist.m3u) lines"
          
          # প্রসেস করা প্লেলিস্ট তৈরি
          TEMP_PROCESSED=$(mktemp)
          
          echo "🔄 Processing playlist (removing #KODIPROP and #EXTVLCOPT lines)..."
          
          # শুধুমাত্র #EXTINF এবং URL লাইন রাখুন, #KODIPROP এবং #EXTVLCOPT লাইন বাদ দিন
          while IFS= read -r line; do
            if [[ ! "$line" =~ ^#KODIPROP: ]] && [[ ! "$line" =~ ^#EXTVLCOPT: ]]; then
              echo "$line" >> "$TEMP_PROCESSED"
            fi
          done < source_playlist.m3u
          
          # এখন প্রথম #EXTINF:-1 খুঁজে বের করুন এবং তার আগের সবকিছু রিমুভ করুন
          PROCESSED_FILE=$(mktemp)
          FOUND_FIRST_EXTINF=false
          
          echo "🔍 Finding first #EXTINF:-1 entry..."
          
          while IFS= read -r line; do
            if [[ "$line" =~ ^#EXTINF:-1 ]]; then
              if [ "$FOUND_FIRST_EXTINF" = false ]; then
                FOUND_FIRST_EXTINF=true
                echo "✅ Found first #EXTINF:-1 entry"
                # প্রথম #EXTINF:-1 এর পর থেকে সব লাইন কপি করুন
                echo "$line" >> "$PROCESSED_FILE"
              else
                echo "$line" >> "$PROCESSED_FILE"
              fi
            elif [ "$FOUND_FIRST_EXTINF" = true ]; then
              echo "$line" >> "$PROCESSED_FILE"
            fi
          done < "$TEMP_PROCESSED"
          
          # চ্যানেল কাউন্ট করুন
          CHANNEL_COUNT=$(grep -c "^#EXTINF:-1" "$PROCESSED_FILE" 2>/dev/null || echo "0")
          
          echo "📊 Processing complete:"
          echo "   - Channels found: $CHANNEL_COUNT"
          echo "   - Processed file lines: $(wc -l < "$PROCESSED_FILE")"
          
          # ফাইনাল ফাইল তৈরি
          FINAL_FILE="Yupp.m3u"
          
          # হেডার যোগ করুন
          echo "#EXTM3U" > "$FINAL_FILE"
          echo "# Yupp TV Playlist" >> "$FINAL_FILE"
          echo "# Total Channels: $CHANNEL_COUNT" >> "$FINAL_FILE"
          echo "# Updated: $BD_TIME" >> "$FINAL_FILE"
          echo "# Local Time: $BD_TIME_READABLE" >> "$FINAL_FILE"
          echo "# Auto-Update Every 20 Minutes Per Hour" >> "$FINAL_FILE"
          echo "# Powered By: Sirome TV 🔴 এই ফাইলের সমস্ত লিঙ্ক পাবলিক সোর্স থেকে সংগ্রহ করা হয়েছে। যদি কেউ তাদের সোর্স মুছে ফেলতে চান, তাহলে দয়া করে আমাদের জানান। আমরা আপনার মতামত এবং প্রচেষ্টাকে সম্মান করি, তাই আপনার সোর্স মুছে ফেলার ব্যাপারে আমরা আপত্তি করব না। 🔴 All the links in this file are collected from public sources. If anyone wants to remove their source, please let us know. We respect your opinions and efforts, so we will not object to removing your source." >> "$FINAL_FILE"
          
          # ৫ লাইন গ্যাপ
          for i in {1..5}; do
            echo "" >> "$FINAL_FILE"
          done
          
          # প্রসেস করা কন্টেন্ট যোগ করুন
          cat "$PROCESSED_FILE" >> "$FINAL_FILE"
          
          # টেম্পোরারি ফাইল ডিলিট করুন
          rm -f "$TEMP_PROCESSED" "$PROCESSED_FILE" source_playlist.m3u
          
          # ফলাফল চেক করুন
          LINES_COUNT=$(wc -l < "$FINAL_FILE")
          echo "✅ Final playlist created:"
          echo "   - Total lines: $LINES_COUNT"
          echo "   - Channel count: $CHANNEL_COUNT"
          echo "   - Download time: $BD_TIME"
          
          echo "🔍 First 15 lines of final playlist:"
          head -15 "$FINAL_FILE"
          
        else
          echo "❌ Error: Failed to download playlist or file is empty"
          echo "ℹ️ Please check your SIROME_YUPPTV secret URL"
          exit 1
        fi
        
    - name: Copy playlist to playlist repository
      run: |
        echo "📁 Copying playlist to target repository..."
        
        # workflow repo থেকে playlist repo-তে কপি করুন
        cp ./workflow-repo/Yupp.m3u ./playlist-repo/Yupp.m3u
        
        echo "✅ Playlist copied successfully"
        echo "📊 File size in playlist repo: $(wc -l < ./playlist-repo/Yupp.m3u) lines"
        
    - name: Check if playlist changed
      id: check_changes
      working-directory: ./playlist-repo
      run: |
        changes_detected=false
        
        echo "🔍 Checking for changes in playlist..."
        
        if [ -f "Yupp.m3u" ] && [ -s "Yupp.m3u" ]; then
          # ফাইল এক্সিস্ট করলে changes চেক করুন
          if ! git diff --quiet Yupp.m3u; then
            changes_detected=true
            echo "🔄 Changes detected in Yupp.m3u"
            
            # পরিবর্তনের বিস্তারিত দেখান
            echo "📊 Changes summary:"
            git diff --stat Yupp.m3u
          else
            echo "✅ No content changes detected"
          fi
        else
          changes_detected=true
          echo "📝 New Yupp.m3u file will be created"
        fi
        
        echo "changes_detected=$changes_detected" >> $GITHUB_OUTPUT
        
    - name: Determine commit message type
      id: commit_type
      working-directory: ./playlist-repo
      run: |
        # বাংলাদেশের সময় সংগ্রহ
        COMMIT_TIME_READABLE=$(TZ='Asia/Dhaka' date +'%A, %d %B %Y, %I:%M:%S %p')
        
        # রিপোজিটরি খালি কিনা চেক (প্রথম রান)
        if [ ! -f "Yupp.m3u" ] || [ ! -s "Yupp.m3u" ]; then
          echo "📝 First run or empty repository"
          echo "commit_type=first" >> $GITHUB_OUTPUT
          echo "commit_msg=🆗 Yupp TV : 🆕 Start Done ✅ - at $COMMIT_TIME_READABLE" >> $GITHUB_OUTPUT
        else
          # শুধু ম্যানুয়াল ট্রিগার চেক
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "🔄 Manual trigger detected"
            echo "commit_type=manual" >> $GITHUB_OUTPUT
            echo "commit_msg=🆗 Yupp TV : 🆕 Start Done ✅ - at $COMMIT_TIME_READABLE" >> $GITHUB_OUTPUT
          # স্কিডিউলড আপডেট
          else
            echo "⏰ Scheduled update detected"
            echo "commit_type=scheduled" >> $GITHUB_OUTPUT
            echo "commit_msg=🆗 Yupp TV : 🔄 Updated Done ✅ - at $COMMIT_TIME_READABLE" >> $GITHUB_OUTPUT
          fi
        fi
        
    - name: Commit and push if changes
      if: steps.check_changes.outputs.changes_detected == 'true'
      working-directory: ./playlist-repo
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Yupp.m3u
        
        # নির্ধারিত commit message ব্যবহার করুন
        commit_msg="${{ steps.commit_type.outputs.commit_msg }}"
        echo "📝 Commit message: $commit_msg"
        
        git commit -m "$commit_msg"
        
        echo "🚀 Pushing changes to playlist repository..."
        git push
        echo "✅ Playlist updated successfully!"
        echo "🕐 Next auto-sync in 20 minutes"
        
    - name: No changes detected
      if: steps.check_changes.outputs.changes_detected == 'false'
      run: |
        BD_TIME_READABLE=$(TZ='Asia/Dhaka' date +'%A, %d %B %Y, %I:%M:%S %p Bangladesh Time')
        echo "✅ No changes detected in playlist"
        echo "🕐 Last checked: $BD_TIME_READABLE"
        echo "⏰ Next check in 20 minutes"
        
    - name: Cleanup and final report
      if: always()
      run: |
        BD_TIME_READABLE=$(TZ='Asia/Dhaka' date +'%A, %d %B %Y, %I:%M:%S %p Bangladesh Time')
        echo "🏁 Workflow completed at: $BD_TIME_READABLE"
        
        cd ./playlist-repo
        
        if [ -f "Yupp.m3u" ]; then
          LINES_COUNT=$(wc -l < Yupp.m3u)
          CHANNEL_COUNT=$(grep -c "^#EXTINF:-1" Yupp.m3u 2>/dev/null || echo "0")
          echo "📊 Final playlist status:"
          echo "   - Total lines: $LINES_COUNT"
          echo "   - Channel count: $CHANNEL_COUNT"
          echo "   - File size: $(wc -c < Yupp.m3u) bytes"
          echo "📝 Last commit info:"
          git log -1 --oneline
        else
          echo "❌ No playlist file found in repository"
        fi
        echo "✅ Yupp TV sync process finished!"
