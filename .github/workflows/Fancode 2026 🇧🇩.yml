name: Fancode 2026 🇧🇩

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

env:
  SOURCE_URL: ${{ secrets.Fancode_2026 }}
  TARGET_REPO: sirometv/playlist
  TARGET_BRANCH: main
  TARGET_PATH: fancodeBD.m3u
  # গ্রুপের নাম কমা দিয়ে লিখুন (যেমন: Cricket, Football, Golf, Hockey)
  FILTER_GROUPS: 'Cricket, Football, Golf, Hockey'

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ env.TARGET_BRANCH }}
          path: target-repo

      - name: Fetch and Process Source Playlist
        run: |
          echo "📥 Fetching source playlist from secret URL..."
          curl -s -L "${{ env.SOURCE_URL }}" > source_playlist.m3u

          if [ ! -s source_playlist.m3u ]; then
            echo "❌ Failed to download source playlist or file is empty!"
            exit 1
          fi

          echo "🔍 Filtering for groups: ${{ env.FILTER_GROUPS }}"

          # কমা-সেপারেটেড গ্রুপ তালিকাকে পাইপ-সেপারেটেড প্যাটার্নে রূপান্তর
          FILTER_PATTERN=$(echo "${{ env.FILTER_GROUPS }}" | awk -F, '{for(i=1;i<=NF;i++){gsub(/^[ \t]+|[ \t]+$/, "", $i); if(length($i)>0) {printf "%s|", $i}}}' | sed 's/|$//')
          echo "Using pattern: $FILTER_PATTERN"

          awk -v pattern="$FILTER_PATTERN" '
          BEGIN {
            split(pattern, group_arr, "|");
            match_found = 0;
            extinf_line = "";
          }
          
          /^#EXTINF:-1.*group-title="/ {
            extinf_line = $0;
            for (i in group_arr) {
              if (tolower(extinf_line) ~ tolower(group_arr[i]) "\"") {
                match_found = 1;
                break;
              }
            }
            next;
          }
          
          match_found == 1 && !/^#/ && NF > 0 {
            # group-title পরিবর্তন করে "Live Event" করা হচ্ছে
            gsub(/group-title="[^"]*"/, "group-title=\"Live Event\"", extinf_line);
            print extinf_line;
            print $0;
            print "";
            print "";
            match_found = 0;
            extinf_line = "";
            next;
          }
          
          /^#EXTINF/ || /^#EXTM3U/ {
            match_found = 0;
            extinf_line = "";
          }
          ' source_playlist.m3u > filtered_entries.txt

          echo "✅ Filtering complete. $(grep -c '^#EXTINF' filtered_entries.txt) entries found."

      - name: Generate Final Playlist with Header
        run: |
          BDT_TIME=$(TZ=Asia/Dhaka date +"%I:%M:%S%p - %d-%m-%Y")
          
          cat > target-repo/${{ env.TARGET_PATH }} << 'EOF'
          #EXTM3U
          #🔴 এই ফাইলের সমস্ত লিঙ্ক পাবলিক সোর্স থেকে সংগ্রহ করা হয়েছে। যদি কেউ তাদের সোর্স মুছে ফেলতে চান, তাহলে দয়া করে আমাদের জানান। আমরা আপনার মতামত এবং প্রচেষ্টাকে সম্মান করি, তাই আপনার সোর্স মুছে ফেলার ব্যাপারে আমরা আপত্তি করব না।
          #🔴All the links in this file are collected from public sources. If anyone wants to remove their source, please let us know. We respect your opinions and efforts, so we will not object to removing your source.
          EOF
          
          echo "#Update Time ✔️: $BDT_TIME (Bangladesh Time)" >> target-repo/${{ env.TARGET_PATH }}
          echo "#Telegram 🔗: https://t.me/sirometv" >> target-repo/${{ env.TARGET_PATH }}
          echo "#WEB TV 📺: https://sirometv-tv.vercel.app" >> target-repo/${{ env.TARGET_PATH }}
          echo "" >> target-repo/${{ env.TARGET_PATH }}
          
          cat filtered_entries.txt >> target-repo/${{ env.TARGET_PATH }}
          
          echo "📝 Final playlist created at target-repo/${{ env.TARGET_PATH }}"

      - name: Commit and Push Changes
        run: |
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "✅ No changes in the playlist. Skipping commit."
            exit 0
          fi
          
          git add ${{ env.TARGET_PATH }}
          git commit -m "🔄 Auto-update playlist: $(date +'%Y-%m-%d %H:%M:%S BDT')"
          git push origin ${{ env.TARGET_BRANCH }}
          
          echo "🚀 Playlist successfully updated in ${{ env.TARGET_REPO }}"
